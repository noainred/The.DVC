name: horizon-monitor-release

# Horizon UAG Monitor(Windows 트레이 앱) 단일 실행 파일(.exe) 빌드·게시.
# 수동 실행(workflow_dispatch) 또는 horizon-v* 태그 push 시 windows-latest에서 빌드해
# 롤링 릴리스 'horizon-monitor'에 exe를 자산으로 올린다.
#   다운로드: https://github.com/noainred/The.DVC/releases/download/horizon-monitor/HorizonUagMonitor.exe

on:
  workflow_dispatch:
  push:
    tags: ['horizon-v*']

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: horizon-uag-monitor
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore

      - name: Publish single-file exe (win-x64, self-contained)
        run: >
          dotnet publish -c Release -r win-x64 --self-contained true
          -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true
          -o publish

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: HorizonUagMonitor-exe
          path: horizon-uag-monitor/publish/HorizonUagMonitor.exe
          if-no-files-found: error

      - name: Publish to rolling release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd publish
          gh release view horizon-monitor >/dev/null 2>&1 || \
            gh release create horizon-monitor --title "Horizon UAG Monitor" \
              --notes "VMware Horizon UAG / Virtual App 포탈 443 모니터(Windows 트레이). 최신 빌드 자동 게시."
          gh release upload horizon-monitor HorizonUagMonitor.exe --clobber
